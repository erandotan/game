<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Presales World Tour — Deal Shot!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;600;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e1a; --panel: #111827; --border: #1f2d4a;
      --accent: #f59e0b; --accent2: #06b6d4; --text: #e2e8f0; --muted: #64748b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* TOP BAR */
    #topbar { display: flex; align-items: center; padding: 8px 20px; background: var(--panel); border-bottom: 2px solid var(--border); flex-shrink: 0; gap: 12px; }
    #title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 20px #f59e0b88; white-space: nowrap; }
    #status-badge { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
    .status-waiting  { background: #1e3a5f; color: var(--accent2); border: 1px solid var(--accent2); }
    .status-playing  { background: #14532d; color: #4ade80; border: 1px solid #4ade80; }
    .status-paused   { background: #7c2d12; color: #fb923c; border: 1px solid #fb923c; animation: pulse-border 1s infinite; }
    .status-gameover { background: #4a1d96; color: #c084fc; border: 1px solid #c084fc; }
    @keyframes pulse-border { 0%,100%{opacity:1} 50%{opacity:.5} }
    #player-count { font-size: 13px; color: var(--muted); white-space: nowrap; }
    #deal-progress { font-size: 13px; color: var(--accent); font-weight: 800; white-space: nowrap; }
    #controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }
    .btn { padding: 7px 16px; border-radius: 8px; border: none; font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 12px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all .15s; }
    .btn:active { transform: scale(.96); }
    .btn-gold { background: var(--accent); color: #000; }
    .btn-gold:hover { background: #fbbf24; }
    .btn-cyan { background: var(--accent2); color: #000; }
    .btn-cyan:hover { background: #22d3ee; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-red:hover { background: #f87171; }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    /* MAIN LAYOUT */
    #main { display: flex; flex: 1; overflow: hidden; }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: radial-gradient(ellipse at 50% 40%, #0f1f3d 0%, #0a0e1a 100%); }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

    /* SIDEBAR */
    #sidebar { width: 210px; background: var(--panel); border-left: 2px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    #sidebar-progress { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); }
    #sidebar-progress h3 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; }
    #progress-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
    #progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }
    #progress-text { font-size: 11px; color: var(--muted); margin-top: 4px; }
    #sidebar h4 { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--muted); padding: 8px 16px 4px; }
    #deal-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .deal-row { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px; margin-bottom: 3px; background: #0a0e1a; border: 1px solid var(--border); font-size: 11px; }
    .deal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .deal-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-weight: 600; }
    .deal-by { color: var(--muted); font-size: 10px; white-space: nowrap; }
    #scores-section { border-top: 1px solid var(--border); padding: 4px 8px 8px; flex-shrink: 0; }
    .player-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 8px; margin-bottom: 3px; background: #0a0e1a; border: 1px solid var(--border); }
    .player-row.me { border-color: var(--accent2); }
    .player-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .player-name { flex: 1; font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-score { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); }
    .admin-badge { font-size: 9px; background: var(--accent); color: #000; padding: 1px 4px; border-radius: 4px; font-weight: 800; letter-spacing: 1px; }

    /* HIT OVERLAY */
    #hit-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.8); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 20px; backdrop-filter: blur(6px); }
    #hit-overlay.show { display: flex; }
    #hit-card { background: linear-gradient(135deg, #111827, #1e3a5f); border: 3px solid var(--accent); border-radius: 20px; padding: 40px 60px; text-align: center; box-shadow: 0 0 60px #f59e0b55; animation: pop-in .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop-in { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #hit-emoji { font-size: 64px; margin-bottom: 12px; }
    #hit-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px; color: var(--muted); margin-bottom: 8px; }
    #hit-deal { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--accent); letter-spacing: 2px; line-height: 1.1; margin-bottom: 16px; text-shadow: 0 0 30px #f59e0b88; }
    #hit-player { font-size: 16px; font-weight: 600; margin-bottom: 24px; }
    #hit-admin-note { font-size: 13px; color: var(--muted); }

    /* LEVEL UP OVERLAY */
    #levelup-overlay { display:none; position:absolute; inset:0; z-index:150; align-items:center; justify-content:center; pointer-events:none; }
    #levelup-overlay.show { display:flex; }
    #levelup-card { background:linear-gradient(135deg,#1a0a2e,#2d1054); border:3px solid #a855f7; border-radius:24px; padding:36px 60px; text-align:center; box-shadow:0 0 80px #a855f788; animation:levelup-in .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes levelup-in { from{transform:scale(.3) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0deg);opacity:1} }
    #levelup-emoji { font-size:72px; margin-bottom:8px; animation:bounce-emoji .6s ease infinite alternate; }
    @keyframes bounce-emoji { from{transform:translateY(0)} to{transform:translateY(-12px)} }
    #levelup-title { font-family:'Bebas Neue',sans-serif; font-size:64px; letter-spacing:6px; color:#a855f7; text-shadow:0 0 40px #a855f7aa; }
    #levelup-sub { font-size:18px; font-weight:600; color:#e2e8f0; margin-top:8px; }

    /* GAMEOVER OVERLAY */
    #gameover-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.92); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    #gameover-overlay.show { display: flex; }
    #gameover-card { background: linear-gradient(135deg, #111827, #1a1040); border: 3px solid #c084fc; border-radius: 24px; padding: 40px 50px; text-align: center; max-width: 680px; width: 90%; box-shadow: 0 0 80px #c084fc44; animation: pop-in .5s cubic-bezier(.34,1.56,.64,1); max-height: 90vh; overflow-y: auto; }
    #gameover-card h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; color: #c084fc; text-shadow: 0 0 30px #c084fc88; margin-bottom: 4px; }
    #gameover-card p { color: var(--muted); margin-bottom: 24px; }
    #gameover-deals { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; text-align: left; }
    .go-deal-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
    .go-deal-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); width: 24px; }
    .go-deal-name { flex: 1; font-size: 13px; font-weight: 600; }
    .go-deal-player { font-size: 12px; font-weight: 600; }
    #gameover-podium { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .podium-card { padding: 12px 18px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); text-align: center; min-width: 100px; }
    .podium-rank { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
    .podium-name { font-size: 13px; font-weight: 800; }
    .podium-score { font-size: 11px; color: var(--muted); }

    /* CONFETTI */
    #confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 99; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: fall linear forwards; }
    @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

    /* JOIN MODAL */
    #join-modal { position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 300; display: flex; align-items: center; justify-content: center; }
    #join-card { background: var(--panel); border: 2px solid var(--accent); border-radius: 20px; padding: 48px; text-align: center; width: 420px; box-shadow: 0 0 60px #f59e0b33; animation: pop-in .4s cubic-bezier(.34,1.56,.64,1); }
    #join-card h1 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 4px; color: var(--accent); margin-bottom: 4px; }
    #join-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    #join-name { width: 100%; padding: 14px 18px; background: var(--bg); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 18px; text-align: center; margin-bottom: 16px; transition: border-color .2s; }
    #join-name:focus { outline: none; border-color: var(--accent); }
    #join-btn { width: 100%; padding: 14px; font-size: 16px; letter-spacing: 3px; }
  </style>
</head>
<body>

<!-- JOIN MODAL -->
<div id="join-modal">
  <div id="join-card">
    <div style="font-size:48px;margin-bottom:8px">🎯</div>
    <h1>DEAL SHOT!</h1>
    <p>Presales World Tour · Happy Hour Challenge</p>
    <input id="join-name" type="text" placeholder="Your name..." maxlength="20" />
    <button class="btn btn-gold" id="join-btn" onclick="joinGame()">JOIN THE GAME</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="title" style="display:flex;align-items:center;gap:12px;">

<!-- MAIN -->
<div id="main">
  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="confetti-wrap"></div>

    <!-- HIT OVERLAY -->
    <div id="hit-overlay">
      <div id="hit-card">
        <div id="hit-emoji">🎯</div>
        <div id="hit-title">DEAL UNLOCKED!</div>
        <div id="hit-deal"></div>
        <div id="hit-player"></div>
        <div id="hit-admin-note">🎤 The floor is yours...</div>
      </div>
    </div>

    <!-- LEVEL UP OVERLAY -->
    <div id="levelup-overlay">
      <div id="levelup-card">
        <div id="levelup-emoji">⬆️</div>

        <div id="levelup-sub"></div>
      </div>
    </div>

    <!-- GAMEOVER OVERLAY -->
    <div id="gameover-overlay">
      <div id="gameover-card">
        <div style="font-size:72px;margin-bottom:8px">🏆</div>

        <p>Presales World Tour Complete — Amazing work, team!</p>
        <div id="gameover-deals"></div>
        <div id="gameover-podium"></div>
        <button class="btn btn-red" id="btn-reset-go" onclick="resetGame()" style="display:none;margin-top:20px;padding:10px 30px;font-size:14px">↺ PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-progress">
      <h3>🏆 PROGRESS</h3>
      <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
      <div id="progress-text">0 / 15 deals closed</div>
    </div>
    <h4>CLOSED DEALS</h4>
    <div id="deal-list"><div style="padding:8px;color:var(--muted);font-size:11px;">No deals yet...</div></div>
    <div id="scores-section">
      <h4 style="padding:6px 8px 4px">SCORES</h4>
      <div id="scoreboard"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────
const GAME_W = 1240, GAME_H = 700;
const SHOOT_Y = 520;   // shooting zone starts at this y (game coords = bottom 26%)
const BALL_R  = 13;
const TARGET_R_L1 = 40;   // level 1: hits 0-4
const TARGET_R_L2 = 26;   // level 2: hits 5-9
const TARGET_R_L3 = 17;   // level 3: hits 10+
function getTargetR() {
  const h = hitDeals.length;
  if (h >= 10) return TARGET_R_L3;
  if (h >= 5)  return TARGET_R_L2;
  return TARGET_R_L1;
}
// Keep a stable alias used in computeTargetPos
const TARGET_R = TARGET_R_L1; // only used as initial margin reference below

// Per-deal animation params [speedX, speedY, phaseX, phaseY]
const ANIM = [
  [0.55, 0.73, 0.0, 0.5],  [0.70, 0.91, 0.5, 1.0],  [0.80, 0.62, 1.0, 1.5],
  [0.65, 0.85, 1.5, 0.3],  [0.90, 0.70, 0.3, 0.8],  [0.60, 0.95, 0.8, 1.2],
  [0.75, 0.65, 1.2, 0.7],  [0.85, 0.55, 0.7, 0.2],  [0.70, 0.80, 0.2, 0.9],
  [0.80, 0.68, 0.9, 0.4],  [0.65, 0.90, 0.4, 1.1],  [0.95, 0.72, 1.1, 0.6],
  [0.75, 0.85, 0.6, 1.4],  [0.60, 0.65, 1.4, 0.1],  [0.85, 0.78, 0.1, 0.8]
];

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

let ws, myId, isAdmin = false;
let gameState = 'waiting';
let players = {}, hitDeals = [], currentDealIndex = 0, totalDeals = 15;
let hitDeal = null;
let myBall  = null;
let dragging = false, dragStart = null, dragCurrent = null;
let lastBallSent = 0, hitSentForDeal = -1, lastSentBallPos = null;
let frozenTargetPos = null;

// ─────────────────────────────────────────────────────
// CANVAS SIZING & COORDINATE MAPPING
// ─────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function toCanvas(gx, gy) {
  return { x: (gx / GAME_W) * canvas.width, y: (gy / GAME_H) * canvas.height };
}
function toGame(cx, cy) {
  return { x: (cx / canvas.width) * GAME_W, y: (cy / canvas.height) * GAME_H };
}

// ─────────────────────────────────────────────────────
// TARGET ANIMATION
// ─────────────────────────────────────────────────────
function computeTargetPos() {
  const t  = Date.now() / 1000;
  const tr = getTargetR();
  const [sx, sy, px, py] = ANIM[currentDealIndex % ANIM.length];
  const margin = 90;
  const playH  = SHOOT_Y - tr * 2 - margin;
  const cx = GAME_W / 2,  cy = playH / 2 + tr + margin * 0.5;
  const ax = GAME_W / 2 - margin - tr;
  const ay = playH / 2 - tr - 10;
  return {
    x: cx + ax * Math.sin(sx * t + px),
    y: Math.max(tr + 20, cy + ay * Math.sin(sy * t + py)),
    r: tr
  };
}

function getTargetPos() {
  if ((gameState === 'paused' || gameState === 'gameover') && frozenTargetPos) {
    return frozenTargetPos;
  }
  return computeTargetPos();
}

// ─────────────────────────────────────────────────────
// WEBSOCKET
// ─────────────────────────────────────────────────────
function connect(name) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const host  = location.host || 'localhost:3000';
  const joinBtn = document.getElementById('join-btn');
  joinBtn.textContent = 'CONNECTING...';
  joinBtn.disabled = true;

  ws = new WebSocket(`${proto}://${host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'setName', name }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (!document.getElementById('join-modal').dataset.hidden) {
      document.getElementById('join-modal').style.display = 'none';
      document.getElementById('join-modal').dataset.hidden = '1';
    }
    handleMessage(msg);
  };

  ws.onerror = () => {
    joinBtn.textContent = 'JOIN THE GAME';
    joinBtn.disabled = false;
    alert('Could not connect. Make sure the server is running.');
  };

  ws.onclose = () => { setTimeout(() => location.reload(), 2000); };
}

function handleMessage(msg) {
  if (msg.type === 'init') {
    myId    = msg.playerId;
    isAdmin = msg.isAdmin;
    updateAdminControls();
  }

  if (msg.type === 'state') {
    players          = {};
    msg.players.forEach(p => players[p.id] = p);
    gameState        = msg.gameState;
    hitDeal          = msg.hitDeal;
    hitDeals         = msg.hitDeals || [];
    currentDealIndex = msg.currentDealIndex || 0;
    totalDeals       = msg.totalDeals || 15;

    // Sync admin status from server in case of reconnect
    const me = players[myId];
    if (me) isAdmin = me.isAdmin;

    updateUI();
    updateScoreboard();
    updateDealList();

    if (gameState === 'paused' && hitDeal && !document.getElementById('hit-overlay').classList.contains('show')) {
      frozenTargetPos = computeTargetPos();
      showHitOverlay(hitDeal.deal, hitDeal.player, hitDeal.color);
    }
    if (gameState === 'gameover') {
      showGameOver();
    }
  }

  // Legacy single-ball update (kept for compatibility)
  if (msg.type === 'ballUpdate') {
    if (players[msg.playerId]) players[msg.playerId].ball = msg.ball;
  }

  // Batched ball positions (replaces per-message fan-out)
  if (msg.type === 'balls') {
    Object.entries(msg.balls).forEach(([pid, ball]) => {
      if (pid !== myId && players[pid]) players[pid].ball = ball;
    });
  }

  if (msg.type === 'hit') {
    frozenTargetPos = computeTargetPos();
    gameState = 'paused';
    showHitOverlay(msg.deal, msg.playerName, msg.playerColor);
    spawnConfetti();
    updateAdminControls();
  }

  if (msg.type === 'gameStarted') {
    gameState = 'playing';
    currentDealIndex = 0;
    hitDeals = [];
    frozenTargetPos  = null;
    hitSentForDeal   = -1;
    lastSentBallPos  = null;
    myBall = null;
    document.getElementById('hit-overlay').classList.remove('show');
    document.getElementById('gameover-overlay').classList.remove('show');
    updateAdminControls();
  }

  if (msg.type === 'resumed') {
    const prevDeals  = hitDeals.length;
    currentDealIndex = msg.currentDealIndex;
    frozenTargetPos  = null;
    hitSentForDeal   = -1;
    lastSentBallPos  = null;
    gameState        = 'playing';
    myBall = null;
    document.getElementById('hit-overlay').classList.remove('show');
    updateAdminControls();
    updateUI();
    // Trigger level-up banner when crossing the threshold
    if (prevDeals < 10 && hitDeals.length >= 10) showLevelUp(3);
    else if (prevDeals < 5 && hitDeals.length >= 5) showLevelUp(2);
  }

  if (msg.type === 'gameover') {
    gameState = 'gameover';
    showGameOver();
    updateAdminControls();
  }
}

// ─────────────────────────────────────────────────────
// UI UPDATES
// ─────────────────────────────────────────────────────
function updateUI() {
  const badge = document.getElementById('status-badge');
  badge.className = 'status-badge status-' + gameState;
  badge.textContent = { waiting: 'WAITING', playing: 'IN PLAY', paused: '⏸ PAUSED', gameover: '🏆 DONE' }[gameState] || gameState;

  const count = Object.keys(players).length;
  document.getElementById('player-count').textContent = `${count} player${count !== 1 ? 's' : ''}`;

  const prog = document.getElementById('deal-progress');
  if (gameState !== 'waiting') {
    prog.style.display = 'inline';
    prog.textContent = `${hitDeals.length} / ${totalDeals} DEALS`;
  } else {
    prog.style.display = 'none';
  }

  document.getElementById('progress-bar').style.width = `${(hitDeals.length / totalDeals) * 100}%`;
  document.getElementById('progress-text').textContent = `${hitDeals.length} / ${totalDeals} deals closed`;

  updateAdminControls();
}

function updateAdminControls() {
  document.getElementById('btn-start').style.display  = isAdmin ? 'inline-block' : 'none';
  document.getElementById('btn-resume').style.display = (isAdmin && gameState === 'paused') ? 'inline-block' : 'none';
  document.getElementById('btn-reset').style.display  = isAdmin ? 'inline-block' : 'none';
  document.getElementById('btn-start').disabled       = gameState !== 'waiting';
}

function updateScoreboard() {
  const list = Object.values(players).sort((a, b) => b.score - a.score);
  document.getElementById('scoreboard').innerHTML = list.map(p => `
    <div class="player-row ${p.id === myId ? 'me' : ''}">
      <div class="player-dot" style="background:${p.color}"></div>
      <div class="player-name">${escHtml(p.name)}${p.isAdmin ? ' <span class="admin-badge">ADMIN</span>' : ''}</div>
      <div class="player-score">${p.score}</div>
    </div>`).join('');
}

function updateDealList() {
  if (!hitDeals.length) {
    document.getElementById('deal-list').innerHTML = '<div style="padding:8px;color:var(--muted);font-size:11px;">No deals yet...</div>';
    return;
  }
  const reversed = [...hitDeals].reverse();
  document.getElementById('deal-list').innerHTML = reversed.map((d, i) => `
    <div class="deal-row">
      <div class="deal-dot" style="background:${d.color}"></div>
      <div class="deal-name">${escHtml(d.deal)}</div>
      <div class="deal-by" style="color:${d.color}">${escHtml(d.player)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────
// OVERLAYS
// ─────────────────────────────────────────────────────
let levelupTimer = null;
function showLevelUp(level) {
  const overlay = document.getElementById('levelup-overlay');
  const emoji   = level === 2 ? '🔥' : '💎';
  const subText = level === 2
    ? 'Target is now SMALLER — stay sharp!'
    : 'TINY target — MAXIMUM precision required!';
  document.getElementById('levelup-emoji').textContent = emoji;
  document.getElementById('levelup-sub').textContent   = subText;
  overlay.classList.add('show');
  clearTimeout(levelupTimer);
  levelupTimer = setTimeout(() => overlay.classList.remove('show'), 3000);
}

function showHitOverlay(deal, playerName, color) {
  document.getElementById('hit-deal').textContent = deal;
  document.getElementById('hit-player').innerHTML = `<span style="color:${color}">🎯 ${escHtml(playerName)}</span> scored a hit!`;
  document.getElementById('hit-admin-note').style.display = isAdmin ? 'none' : 'block';
  document.getElementById('hit-overlay').classList.add('show');
}

function showGameOver() {
  document.getElementById('hit-overlay').classList.remove('show');

  const dealsHtml = hitDeals.map((d, i) => `
    <div class="go-deal-row">
      <div class="go-deal-num">${i + 1}</div>
      <div class="deal-dot" style="background:${d.color}"></div>
      <div class="go-deal-name">${escHtml(d.deal)}</div>
      <div class="go-deal-player" style="color:${d.color}">${escHtml(d.player)}</div>
    </div>`).join('');
  document.getElementById('gameover-deals').innerHTML = dealsHtml;

  const sorted = Object.values(players).sort((a, b) => b.score - a.score);
  const medals = ['🥇','🥈','🥉'];
  const podiumHtml = sorted.slice(0, 3).map((p, i) => `
    <div class="podium-card" style="border-color:${p.color}44">
      <div class="podium-rank">${medals[i] || '#' + (i+1)}</div>
      <div class="podium-name" style="color:${p.color}">${escHtml(p.name)}</div>
      <div class="podium-score">${p.score} hit${p.score !== 1 ? 's' : ''}</div>
    </div>`).join('');
  document.getElementById('gameover-podium').innerHTML = podiumHtml;

  document.getElementById('btn-reset-go').style.display = isAdmin ? 'inline-block' : 'none';
  document.getElementById('gameover-overlay').classList.add('show');
}

function spawnConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#f59e0b','#06b6d4','#10b981','#ef4444','#cc5de8','#4d96ff','#ff922b'];
  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      border-radius: ${Math.random() > .5 ? '50%' : '2px'};
      animation-duration: ${1.5+Math.random()*2}s;
      animation-delay: ${Math.random()*0.4}s;`;
    wrap.appendChild(el);
  }
  setTimeout(() => wrap.innerHTML = '', 4000);
}

// ─────────────────────────────────────────────────────
// INPUT — shooting zone restricted
// ─────────────────────────────────────────────────────
function getShootZoneY() {
  return (SHOOT_Y / GAME_H) * canvas.height;
}

canvas.addEventListener('mousedown', (e) => {
  if (gameState !== 'playing') return;
  const me = players[myId];
  if (!me || me.ball.active) return;
  const rect = canvas.getBoundingClientRect();
  const cy = e.clientY - rect.top;
  if (cy < getShootZoneY()) return;  // must start in shooting zone
  dragging = true;
  const cx = e.clientX - rect.left;
  dragStart   = { x: cx, y: cy };
  dragCurrent = { x: cx, y: cy };
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragCurrent = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});

canvas.addEventListener('mouseup', (e) => {
  if (!dragging) return;
  dragging = false;
  const dx = dragCurrent.x - dragStart.x;
  const dy = dragCurrent.y - dragStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 8) return;

  // Ball goes in direction of drag (drag UP → ball flies UP)
  const speed = Math.min(dist * 0.15, 20);
  const angle = Math.atan2(dy, dx);
  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed;

  const g = toGame(dragStart.x, dragStart.y);
  myBall = { x: g.x, y: g.y, vx, vy, active: true };
  ws.send(JSON.stringify({ type: 'throw', x: g.x, y: g.y, vx, vy }));
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const cy = t.clientY - rect.top;
  if (cy < getShootZoneY()) return;
  dragging = true;
  const cx = t.clientX - rect.left;
  dragStart = { x: cx, y: cy };
  dragCurrent = { x: cx, y: cy };
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragging) return;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  dragCurrent = { x: t.clientX - rect.left, y: t.clientY - rect.top };
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!dragging) return;
  dragging = false;
  const dx = dragCurrent.x - dragStart.x;
  const dy = dragCurrent.y - dragStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 8) return;
  const speed = Math.min(dist * 0.15, 20);
  const angle = Math.atan2(dy, dx);
  const g = toGame(dragStart.x, dragStart.y);
  myBall = { x: g.x, y: g.y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, active: true };
  ws.send(JSON.stringify({ type: 'throw', x: g.x, y: g.y, vx: myBall.vx, vy: myBall.vy }));
}, { passive: false });

// ─────────────────────────────────────────────────────
// PHYSICS
// ─────────────────────────────────────────────────────
function updateMyBall() {
  if (!myBall || !myBall.active) return;

  myBall.x += myBall.vx;
  myBall.y += myBall.vy;
  myBall.vy += 0.38;   // gravity
  myBall.vx *= 0.992;

  // Wall bouncing
  if (myBall.x < BALL_R)          { myBall.x = BALL_R;          myBall.vx =  Math.abs(myBall.vx) * 0.7; }
  if (myBall.x > GAME_W - BALL_R) { myBall.x = GAME_W - BALL_R; myBall.vx = -Math.abs(myBall.vx) * 0.7; }
  if (myBall.y < BALL_R)          { myBall.y = BALL_R;           myBall.vy =  Math.abs(myBall.vy) * 0.7; }
  if (myBall.y > GAME_H - BALL_R) {
    myBall.y = GAME_H - BALL_R;
    myBall.vy = -Math.abs(myBall.vy) * 0.65;
    myBall.vx *= 0.85;
    if (Math.abs(myBall.vy) < 1.5) myBall.vy = 0;
  }

  // Deactivate ball once it has settled so player can shoot again
  if (Math.abs(myBall.vx) < 0.4 && Math.abs(myBall.vy) < 0.4) {
    myBall.active = false;
    if (players[myId]) players[myId].ball.active = false;
    ws.send(JSON.stringify({ type: 'ballUpdate', ball: myBall }));
    return;
  }

  // Collision with moving target (client-side detection)
  if (gameState === 'playing' && hitSentForDeal !== currentDealIndex) {
    const tgt = computeTargetPos();
    const dx = myBall.x - tgt.x;
    const dy = myBall.y - tgt.y;
    if (Math.sqrt(dx*dx + dy*dy) < tgt.r + BALL_R) {
      hitSentForDeal = currentDealIndex;
      ws.send(JSON.stringify({ type: 'hitTarget' }));
    }
  }

  // Send position update — throttled to 50ms, only when ball moved > 3 units
  const now = Date.now();
  if (now - lastBallSent > 50) {
    const moved = !lastSentBallPos
      || Math.abs(myBall.x - lastSentBallPos.x) > 3
      || Math.abs(myBall.y - lastSentBallPos.y) > 3;
    if (moved) {
      ws.send(JSON.stringify({ type: 'ballUpdate', ball: myBall }));
      if (players[myId]) players[myId].ball = { ...myBall };
      lastSentBallPos = { x: myBall.x, y: myBall.y };
      lastBallSent = now;
    }
  }
}

// ─────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // ── Background grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const shootCanvasY = getShootZoneY();

  // ── Shooting zone background
  ctx.fillStyle = 'rgba(6,182,212,0.06)';
  ctx.fillRect(0, shootCanvasY, W, H - shootCanvasY);

  // ── Shooting zone border line
  ctx.save();
  ctx.strokeStyle = 'rgba(6,182,212,0.45)';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 6]);
  ctx.beginPath(); ctx.moveTo(0, shootCanvasY); ctx.lineTo(W, shootCanvasY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ── Shooting zone label
  ctx.fillStyle = 'rgba(6,182,212,0.55)';
  ctx.font = 'bold 12px Exo 2';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  if (gameState === 'playing') {
    const me = players[myId];
    if (!me || !me.ball.active) {
      ctx.fillText('🏹  CLICK HERE & DRAG UP TOWARD THE TARGET — RELEASE TO SHOOT', W/2, shootCanvasY + 10);
    } else {
      ctx.fillText('⏳  BALL IN PLAY — WAIT FOR IT TO STOP', W/2, shootCanvasY + 10);
    }
  } else if (gameState === 'waiting') {
    ctx.fillText(isAdmin ? '▲  Click START when everyone has joined!' : '⏳  Waiting for admin to start...', W/2, shootCanvasY + 10);
  } else if (gameState === 'paused') {
    ctx.fillText(isAdmin ? '▲  Click RESUME to launch the next deal!' : '⏳  Waiting for admin to resume...', W/2, shootCanvasY + 10);
  }

  // ── Active moving target (only when playing or paused)
  if (gameState === 'playing' || gameState === 'paused') {
    const tgt = getTargetPos();
    const tp  = toCanvas(tgt.x, tgt.y);
    const tr  = (tgt.r / GAME_W) * W;
    const pulse = gameState === 'playing' ? (0.6 + 0.4 * Math.sin(Date.now() / 280)) : 0.3;

    ctx.save();
    // Outer glow ring
    ctx.shadowColor = '#f59e0b';
    ctx.shadowBlur  = 30 * pulse;
    // Outer ring
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, tr + 6, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(245,158,11,${pulse})`;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Main circle
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, tr, 0, Math.PI * 2);
    ctx.fillStyle = '#0f1f3d';
    ctx.fill();
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Inner dark hole
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, tr * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    // "?" label (hidden until hit)
    ctx.fillStyle = `rgba(245,158,11,${0.4 + 0.6 * pulse})`;
    ctx.font = `bold ${Math.round(tr * 0.9)}px Bebas Neue`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('?', tp.x, tp.y);
    // Deal number
    ctx.font = `bold 11px Exo 2`;
    ctx.fillStyle = 'rgba(245,158,11,0.6)';
    const lvl = hitDeals.length >= 10 ? 'LVL 3' : hitDeals.length >= 5 ? 'LVL 2' : '';
    const label = lvl ? `#${currentDealIndex + 1}  ${lvl}` : `#${currentDealIndex + 1} of ${totalDeals}`;
    ctx.fillText(label, tp.x, tp.y + tr + 16);
    ctx.restore();
  }

  // ── Aim line while dragging
  if (dragging && dragStart && dragCurrent) {
    const dx = dragCurrent.x - dragStart.x;
    const dy = dragCurrent.y - dragStart.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 6) {
      const me = players[myId];
      const col = me?.color || '#f59e0b';
      // Trajectory direction line
      ctx.save();
      ctx.strokeStyle = `${col}99`;
      ctx.lineWidth = 2;
      ctx.setLineDash([7, 5]);
      ctx.beginPath();
      ctx.moveTo(dragStart.x, dragStart.y);
      ctx.lineTo(dragStart.x + dx * 2.2, dragStart.y + dy * 2.2);
      ctx.stroke();
      ctx.setLineDash([]);
      // Launch point ball preview
      ctx.shadowColor = col;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(dragStart.x, dragStart.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.7;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
      // Power indicator
      const power = Math.round(Math.min(dist * 0.15, 20) / 20 * 100);
      const hue = 120 - power * 1.2;
      ctx.fillStyle = `hsl(${hue},100%,55%)`;
      ctx.font = 'bold 11px Exo 2';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(`Power: ${power}%`, dragStart.x + 18, dragStart.y - 6);
    }
  }

  // ── Player balls
  Object.values(players).forEach(p => {
    if (!p.ball || !p.ball.active) return;
    const bp = toCanvas(p.ball.x, p.ball.y);
    ctx.save();
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 18;
    const grad = ctx.createRadialGradient(bp.x - 3, bp.y - 3, 1, bp.x, bp.y, 13);
    grad.addColorStop(0, lighten(p.color));
    grad.addColorStop(1, p.color);
    ctx.beginPath();
    ctx.arc(bp.x, bp.y, 13, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
    ctx.font = 'bold 10px Exo 2';
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(p.name, bp.x, bp.y + 15);
  });

  // ── Waiting hint
  if (gameState === 'waiting') {
    ctx.fillStyle = 'rgba(245,158,11,0.5)';
    ctx.font = 'bold 22px Bebas Neue';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎯 PRESALES WORLD TOUR — DEAL SHOT!', W/2, H * 0.38);
    ctx.font = '15px Exo 2';
    ctx.fillStyle = 'rgba(100,116,139,0.7)';
    ctx.fillText(`${totalDeals} deals to close — first to hit scores!`, W/2, H * 0.38 + 36);
  }
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`;
}

// ─────────────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────────────
function loop() {
  updateMyBall();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ─────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────
function joinGame() {
  const name = document.getElementById('join-name').value.trim() || 'Anonymous';
  connect(name);
}
function startGame()  { ws.send(JSON.stringify({ type: 'startGame' })); }
function resumeGame() { ws.send(JSON.stringify({ type: 'resume' })); }
function resetGame()  {
  ws.send(JSON.stringify({ type: 'resetGame' }));
  document.getElementById('hit-overlay').classList.remove('show');
  document.getElementById('gameover-overlay').classList.remove('show');
}

document.getElementById('join-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});
</script>
